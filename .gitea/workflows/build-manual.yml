name: Manual Build (No Release)

on:
  workflow_dispatch:
    inputs:
      build_windows:
        description: '构建 Windows 版本'
        required: true
        default: true
        type: boolean
      build_macos:
        description: '构建 macOS 版本'
        required: true
        default: true
        type: boolean

jobs:
  build-windows:
    if: ${{ inputs.build_windows }}
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow

      - name: Build Windows executable
        run: |
          pyinstaller --onefile --windowed --name VideoSplitTool main.py

      - name: Download FFmpeg
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "."
          $ffmpegDir = Get-ChildItem -Directory -Filter "ffmpeg-*" | Select-Object -First 1
          New-Item -ItemType Directory -Path "dist\ffmpeg\bin" -Force
          Copy-Item "$($ffmpegDir.FullName)\bin\ffmpeg.exe" "dist\ffmpeg\bin\"
          Copy-Item "$($ffmpegDir.FullName)\bin\ffprobe.exe" "dist\ffmpeg\bin\"

      - name: Create README
        run: |
          @"
          视频分割拼接工具 V2.2 - Windows 版 (测试构建)

          使用说明：
          1. 双击运行 VideoSplitTool.exe
          2. FFmpeg 已内置在 ffmpeg/bin 目录下
          "@ | Out-File -FilePath "dist\README.txt" -Encoding utf8

      - name: Create package
        run: |
          $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
          Compress-Archive -Path "dist\*" -DestinationPath "VideoSplitTool_Windows_test_$timestamp.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: windows-build-test
          path: VideoSplitTool_Windows_test_*.zip
          retention-days: 7

  build-macos:
    if: ${{ inputs.build_macos }}
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow

      - name: Build macOS executable
        run: |
          pyinstaller --onefile --windowed --name VideoSplitTool main.py

      - name: Download FFmpeg
        run: |
          brew install ffmpeg
          mkdir -p dist/ffmpeg/bin
          cp $(which ffmpeg) dist/ffmpeg/bin/
          cp $(which ffprobe) dist/ffmpeg/bin/

      - name: Create README
        run: |
          cat > dist/README.txt << 'EOF'
          视频分割拼接工具 V2.2 - macOS 版 (测试构建)

          使用说明：
          1. chmod +x VideoSplitTool && ./VideoSplitTool
          2. FFmpeg 已内置在 ffmpeg/bin 目录下
          EOF

      - name: Create package
        run: |
          timestamp=$(date +%Y%m%d_%H%M%S)
          cd dist
          zip -r "../VideoSplitTool_macOS_test_$timestamp.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: macos-build-test
          path: VideoSplitTool_macOS_test_*.zip
          retention-days: 7
