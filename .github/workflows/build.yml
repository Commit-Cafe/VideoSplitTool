name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 当推送 v 开头的标签时触发（如 v1.0.0）
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow

      - name: Build Windows executable
        run: |
          pyinstaller --onefile --windowed --name VideoSplitTool main.py

      - name: Download FFmpeg
        run: |
          # 下载 FFmpeg
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "."

          # 找到 ffmpeg 目录并复制
          $ffmpegDir = Get-ChildItem -Directory -Filter "ffmpeg-*" | Select-Object -First 1
          New-Item -ItemType Directory -Path "dist\ffmpeg\bin" -Force
          Copy-Item "$($ffmpegDir.FullName)\bin\ffmpeg.exe" "dist\ffmpeg\bin\"
          Copy-Item "$($ffmpegDir.FullName)\bin\ffprobe.exe" "dist\ffmpeg\bin\"

      - name: Create README
        run: |
          @"
          视频分割拼接工具 V2.0 - Windows 版

          使用说明：
          1. 双击运行 VideoSplitTool.exe
          2. FFmpeg 已内置在 ffmpeg/bin 目录下

          更新内容：
          - 视频位置顺序配置（模板在前/列表在前）
          - 封面选帧实时预览（自动更新）
          - 音频配置功能（模板音频/列表音频/混合/静音/自定义）
          - 封面帧来源选择（模板视频/列表视频）
          - 修复封面拼接后音频丢失问题
          - 界面优化

          技术支持：https://github.com/${{ github.repository }}
          "@ | Out-File -FilePath "dist\README.txt" -Encoding utf8

      - name: Create distribution package
        run: |
          $timestamp = Get-Date -Format "yyyyMMdd"
          Compress-Archive -Path "dist\*" -DestinationPath "VideoSplitTool_Windows_$timestamp.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: VideoSplitTool_Windows_*.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow

      - name: Build macOS executable
        run: |
          pyinstaller --onefile --windowed --name VideoSplitTool main.py

      - name: Create README
        run: |
          cat > dist/README.txt << 'EOF'
          视频分割拼接工具 V2.0 - macOS 版

          使用说明：
          1. 安装 FFmpeg（如果还没有）
             brew install ffmpeg

          2. 双击运行 VideoSplitTool
             如果提示"无法打开"，请在终端执行:
             chmod +x VideoSplitTool
             ./VideoSplitTool

          3. 如果遇到安全提示：
             系统偏好设置 -> 安全性与隐私 -> 通用 -> 点击"仍要打开"

          更新内容：
          - 视频位置顺序配置（模板在前/列表在前）
          - 封面选帧实时预览（自动更新）
          - 音频配置功能（模板音频/列表音频/混合/静音/自定义）
          - 封面帧来源选择（模板视频/列表视频）
          - 修复封面拼接后音频丢失问题
          - 界面优化

          技术支持：https://github.com/${{ github.repository }}
          EOF

      - name: Create distribution package
        run: |
          timestamp=$(date +%Y%m%d)
          cd dist
          zip -r "../VideoSplitTool_macOS_$timestamp.zip" VideoSplitTool README.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: VideoSplitTool_macOS_*.zip

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            VideoSplitTool_Windows_*.zip
            VideoSplitTool_macOS_*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
